<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPE Detection System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f8f9fb;
            --bg-secondary: #ffffff;
            --text-primary: #1a202c;
            --text-secondary: #718096;
            --accent-blue: #4a90e2;
            --accent-green: #48bb78;
            --accent-red: #e65c5c;
            --accent-orange: #ed8936;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 10px 24px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        header {
            background: var(--bg-secondary);
            padding: 20px 0;
            box-shadow: var(--shadow-sm);
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            font-size: 26px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-links {
            margin-top: 12px;
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--accent-blue);
        }

        .nav-links a.active {
            color: var(--accent-blue);
            border-bottom: 2px solid var(--accent-blue);
            padding-bottom: 2px;
        }

        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 28px;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
            border: 1px solid var(--border-color);
        }

        .card:hover {
            box-shadow: var(--shadow-lg);
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            min-height: 480px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #videoFeed {
            width: 100%;
            height: auto;
            display: none;
        }

        .video-placeholder {
            color: #888;
            text-align: center;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Poppins', sans-serif;
        }

        .btn-primary {
            background: var(--accent-blue);
            color: white;
        }

        .btn-primary:hover {
            background: #3a7bc8;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.3);
        }

        .btn-danger {
            background: var(--accent-red);
            color: white;
        }

        .btn-danger:hover {
            background: #d14545;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(230, 92, 92, 0.3);
        }

        .btn-warning {
            background: var(--accent-orange);
            color: white;
        }

        .btn-warning:hover {
            background: #dd7421;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(237, 137, 54, 0.3);
        }

        .btn-warning.active {
            background: #dd7421;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-primary);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid var(--accent-blue);
        }

        .stat-card.danger {
            border-left-color: var(--accent-red);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 6px;
            font-weight: 500;
        }

        .alert-list {
            max-height: 320px;
            overflow-y: auto;
        }

        .alert-item {
            padding: 14px;
            background: var(--bg-primary);
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid var(--accent-red);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .alert-time {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .alert-message {
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 500;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-indicator.active {
            background: var(--accent-green);
            animation: pulse 2s infinite;
        }

        .status-indicator.inactive {
            background: var(--text-secondary);
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .compliance-status {
            padding: 14px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            margin-top: 20px;
            font-size: 15px;
        }

        .compliance-status.compliant {
            background: rgba(72, 187, 120, 0.12);
            color: var(--accent-green);
        }

        .compliance-status.non-compliant {
            background: rgba(230, 92, 92, 0.12);
            color: var(--accent-red);
        }

        .dev-mode-indicator {
            background: rgba(237, 137, 54, 0.12);
            color: var(--accent-orange);
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            animation: devBlink 2s infinite;
        }

        @keyframes devBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .person-details {
            background: var(--bg-primary);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid var(--accent-blue);
        }

        .person-details.non-compliant {
            border-left-color: var(--accent-red);
        }

        .ppe-badge {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(74, 144, 226, 0.1);
            border-radius: 12px;
            font-size: 12px;
            margin: 4px 4px 4px 0;
            color: var(--accent-blue);
            font-weight: 500;
        }

        .ppe-badge.missing {
            background: rgba(230, 92, 92, 0.1);
            color: var(--accent-red);
        }

        @media (max-width: 968px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>
                <i class="fas fa-shield-alt"></i> PPE Detection System
            </h1>
            <div class="nav-links">
                <a href="/" class="active">Live Detection</a>
                <a href="/review">Review Instances</a>
                <a href="/settings">Settings</a>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="grid">
            <div class="card">
                <div class="card-title">
                    <div>
                        <span class="status-indicator" id="statusIndicator"></span>
                        Live Detection Feed
                    </div>
                    <!-- <div id="devModeIndicator" class="dev-mode-indicator" style="display: none;">
                        <i class="fas fa-flask"></i> DEV MODE
                    </div> -->
                </div>
                <div class="video-container">
                    <img id="videoFeed" alt="Video Feed">
                    <div class="video-placeholder" id="placeholder">
                        <i class="fas fa-video" style="font-size: 48px; margin-bottom: 16px; opacity: 0.3;"></i>
                        <p>Click "Start Stream" to begin detection</p>
                    </div>
                </div>
                <div class="controls">
                    <button class="btn btn-primary" id="startBtn" onclick="startStream()">
                        <i class="fas fa-play"></i> Start Stream
                    </button>
                    <button class="btn btn-danger" id="stopBtn" onclick="stopStream()" disabled>
                        <i class="fas fa-stop"></i> Stop Stream
                    </button>
                    <!-- <button class="btn btn-warning" id="devModeBtn" onclick="toggleDevMode()">
                        <i class="fas fa-flask"></i> Toggle Dev Mode
                    </button> -->
                </div>
                <div class="compliance-status compliant" id="complianceStatus">
                    <i class="fas fa-check-circle"></i> ALL COMPLIANT
                </div>
            </div>

            <div>
                <div class="card">
                    <div class="card-title">Detection Statistics</div>
                    <div class="stats-grid">
                        <div class="stat-card danger">
                            <div class="stat-value" id="totalDetections">0</div>
                            <div class="stat-label">Total Instances</div>
                        </div>
                        <div class="stat-card danger">
                            <div class="stat-value" id="nonCompliantCount">0</div>
                            <div class="stat-label">Non-Compliant</div>
                        </div>
                        <div class="stat-card danger">
                            <div class="stat-value" id="totalAlerts">0</div>
                            <div class="stat-label">Total Alerts</div>
                        </div>
                    </div>
                </div>

                <div class="card" style="margin-top: 24px;">
                    <div class="card-title">Recent Alerts</div>
                    <div class="alert-list" id="alertList">
                        <p style="color: var(--text-secondary); text-align: center; padding: 20px;">No alerts yet</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="card full-width">
            <div class="card-title">Current Detection</div>
            <div id="currentPersons">
                <p style="color: var(--text-secondary);">No persons detected</p>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let isStreaming = false;
        let devMode = false;

        function startStream() {
            fetch('/start_stream', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    isStreaming = true;
                    document.getElementById('videoFeed').src = '/video_feed?t=' + new Date().getTime();
                    document.getElementById('videoFeed').style.display = 'block';
                    document.getElementById('placeholder').style.display = 'none';
                    document.getElementById('startBtn').disabled = true;
                    document.getElementById('stopBtn').disabled = false;
                    document.getElementById('statusIndicator').classList.add('active');
                    document.getElementById('statusIndicator').classList.remove('inactive');
                });
        }

        function stopStream() {
            isStreaming = false;
            const videoFeed = document.getElementById('videoFeed');
            videoFeed.src = '';
            videoFeed.style.display = 'none';
            document.getElementById('placeholder').style.display = 'block';
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('statusIndicator').classList.remove('active');
            document.getElementById('statusIndicator').classList.add('inactive');
            
            fetch('/stop_stream', { method: 'POST' })
                .then(response => response.json())
                .then(data => console.log('Stream stopped:', data.message))
                .catch(error => console.error('Error stopping stream:', error));
        }

        function toggleDevMode() {
            fetch('/toggle_dev_mode', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    devMode = data.dev_mode;
                    const btn = document.getElementById('devModeBtn');
                    const indicator = document.getElementById('devModeIndicator');
                    if (devMode) {
                        btn.classList.add('active');
                        indicator.style.display = 'inline-flex';
                    } else {
                        btn.classList.remove('active');
                        indicator.style.display = 'none';
                    }
                    alert(data.message);
                })
                .catch(error => console.error('Error toggling dev mode:', error));
        }

        socket.on('alert', function(data) {
            const alertList = document.getElementById('alertList');
            
            if (alertList.querySelector('p')) {
                alertList.innerHTML = '';
            }
            
            const alertItem = document.createElement('div');
            alertItem.className = 'alert-item';
            
            const time = new Date(data.timestamp).toLocaleTimeString();
            const devModeTag = data.dev_mode ? ' <span style="color: var(--accent-orange);">[DEV]</span>' : '';
            alertItem.innerHTML = `
                <div class="alert-time"><i class="fas fa-exclamation-triangle"></i> ${time}${devModeTag}</div>
                <div class="alert-message">${data.description}</div>
            `;
            
            alertList.insertBefore(alertItem, alertList.firstChild);
            updateStats();
        });

        socket.on('detection_update', function(data) {
            const statusDiv = document.getElementById('complianceStatus');
            if (data.is_compliant) {
                statusDiv.className = 'compliance-status compliant';
                statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> ALL COMPLIANT';
            } else {
                statusDiv.className = 'compliance-status non-compliant';
                statusDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> NON-COMPLIANT DETECTED';
            }
            
            const personsDiv = document.getElementById('currentPersons');
            if (data.detection_details && data.detection_details.has_person) {
                const details = data.detection_details;
                const statusIcon = details.is_compliant ? 
                    '<i class="fas fa-check-circle" style="color: var(--accent-green);"></i>' : 
                    '<i class="fas fa-times-circle" style="color: var(--accent-red);"></i>';
                
                let ppeHtml = '';
                if (details.detected_ppe.length > 0) {
                    ppeHtml += '<div style="margin-top: 8px;">Detected: ';
                    ppeHtml += details.detected_ppe.map(ppe => 
                        `<span class="ppe-badge">${ppe}</span>`
                    ).join('');
                    ppeHtml += '</div>';
                }
                
                if (details.missing_ppe.length > 0) {
                    ppeHtml += '<div style="margin-top: 4px;">Missing: ';
                    ppeHtml += details.missing_ppe.map(ppe => 
                        `<span class="ppe-badge missing">${ppe}</span>`
                    ).join('');
                    ppeHtml += '</div>';
                }
                
                personsDiv.innerHTML = `
                    <div class="person-details ${details.is_compliant ? '' : 'non-compliant'}">
                        <div style="font-weight: 600; font-size: 14px;">
                            ${statusIcon} Current Detection
                        </div>
                        ${ppeHtml}
                    </div>
                `;
            } else {
                personsDiv.innerHTML = '<p style="color: var(--text-secondary);">No persons detected</p>';
            }
        });

        function updateStats() {
            fetch('/stats')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('totalDetections').textContent = data.total_detections;
                    document.getElementById('nonCompliantCount').textContent = data.non_compliant_count;
                    document.getElementById('totalAlerts').textContent = data.total_alerts;
                    
                    devMode = data.dev_mode;
                    const indicator = document.getElementById('devModeIndicator');
                    const btn = document.getElementById('devModeBtn');
                    if (devMode) {
                        indicator.style.display = 'inline-flex';
                        if (btn) btn.classList.add('active');
                    } else {
                        indicator.style.display = 'none';
                        if (btn) btn.classList.remove('active');
                    }
                })
                .catch(error => console.error('Error fetching stats:', error));
        }

        document.addEventListener('DOMContentLoaded', function() {
            updateStats();
            setInterval(updateStats, 5000);
            document.getElementById('statusIndicator').classList.add('inactive');
        });
    </script>
</body>
</html>
