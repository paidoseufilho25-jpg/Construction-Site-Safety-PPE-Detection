<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Instances - PPE Detection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f8f9fb;
            --bg-secondary: #ffffff;
            --text-primary: #1a202c;
            --text-secondary: #718096;
            --accent-blue: #4a90e2;
            --accent-green: #48bb78;
            --accent-red: #e65c5c;
            --accent-orange: #ed8936;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 10px 24px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        header {
            background: var(--bg-secondary);
            padding: 20px 0;
            box-shadow: var(--shadow-sm);
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            font-size: 26px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-links {
            margin-top: 12px;
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--accent-blue);
        }

        .nav-links a.active {
            color: var(--accent-blue);
            border-bottom: 2px solid var(--accent-blue);
            padding-bottom: 2px;
        }

        .card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 28px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--text-primary);
        }

        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-group label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        select {
            padding: 10px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
        }

        select:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        .instances-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .instance-card {
            background: var(--bg-primary);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .instance-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .instance-content {
            padding: 16px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .instance-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .instance-id {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .compliance-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .compliance-badge.compliant {
            background: rgba(72, 187, 120, 0.12);
            color: var(--accent-green);
        }

        .compliance-badge.non-compliant {
            background: rgba(230, 92, 92, 0.12);
            color: var(--accent-red);
        }

        .instance-time {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .ppe-info {
            margin-top: 12px;
            min-height: 60px;
        }

        .ppe-section {
            margin-bottom: 8px;
        }

        .ppe-section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .ppe-badge {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(74, 144, 226, 0.1);
            border-radius: 12px;
            font-size: 11px;
            margin: 2px 4px 2px 0;
            color: var(--accent-blue);
            font-weight: 500;
        }

        .ppe-badge.missing {
            background: rgba(230, 92, 92, 0.1);
            color: var(--accent-red);
        }

        .instance-actions {
            display: flex;
            gap: 8px;
            margin-top: auto;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: 'Poppins', sans-serif;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-primary {
            background: var(--accent-blue);
            color: white;
        }

        .btn-primary:hover {
            background: #3a7bc8;
            transform: translateY(-1px);
        }

        .btn-danger {
            background: var(--accent-red);
            color: white;
        }

        .btn-danger:hover {
            background: #d14545;
            transform: translateY(-1px);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 64px;
            opacity: 0.3;
            margin-bottom: 16px;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-box {
            background: var(--bg-primary);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid var(--accent-blue);
        }

        .stat-box.success {
            border-left-color: var(--accent-green);
        }

        .stat-box.danger {
            border-left-color: var(--accent-red);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
            font-weight: 500;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            overflow: auto;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 28px;
            max-width: 1000px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--border-color);
        }

        .modal-title {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: var(--text-primary);
        }

        .snapshots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .snapshot-item {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            background: var(--bg-primary);
        }

        .snapshot-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .snapshot-info {
            padding: 12px;
        }

        .snapshot-time {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .snapshot-number {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        @media (max-width: 768px) {
            .instances-grid {
                grid-template-columns: 1fr;
            }

            .filter-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .filter-group {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>
                <i class="fas fa-shield-alt"></i> PPE Detection System
            </h1>
            <div class="nav-links">
                <a href="/">Live Detection</a>
                <a href="/review" class="active">Review Instances</a>
                <a href="/settings">Settings</a>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <div class="card-title">Non-Compliant Instances</div>
            
            <div class="stats-row">
                <div class="stat-box danger">
                    <div class="stat-value" id="totalInstances">0</div>
                    <div class="stat-label">Total Instances</div>
                </div>
            </div>

            <div class="filter-bar">
                <div class="filter-group">
                    <label for="sortBy">Sort by:</label>
                    <select id="sortBy" onchange="loadInstances()">
                        <option value="first_detected">First Detected</option>
                        <option value="last_updated">Last Updated</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="sortOrder">Order:</label>
                    <select id="sortOrder" onchange="loadInstances()">
                        <option value="desc">Newest First</option>
                        <option value="asc">Oldest First</option>
                    </select>
                </div>
            </div>

            <div class="instances-grid" id="instancesGrid">
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading instances...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Added modal for viewing instance snapshots -->
    <div id="snapshotModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Instance Snapshots</div>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody">
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading snapshots...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function loadInstances() {
            const sortBy = document.getElementById('sortBy').value;
            const sortOrder = document.getElementById('sortOrder').value;

            fetch(`/api/instances?sort=${sortBy}&order=${sortOrder}`)
                .then(response => response.json())
                .then(data => {
                    const grid = document.getElementById('instancesGrid');
                    
                    if (data.length === 0) {
                        grid.innerHTML = `
                            <div class="empty-state">
                                <i class="fas fa-inbox"></i>
                                <p>No non-compliant instances found</p>
                            </div>
                        `;
                        updateStats(0);
                        return;
                    }

                    grid.innerHTML = data.map(instance => {
                        const timestamp = new Date(instance.first_detected);
                        const timeString = timestamp.toLocaleString();
                        
                        let detectedPPE = '';
                        if (instance.detected_ppe.length > 0 && instance.detected_ppe[0] !== '') {
                            detectedPPE = `
                                <div class="ppe-section">
                                    <div class="ppe-section-title">Detected PPE:</div>
                                    ${instance.detected_ppe.map(ppe => 
                                        `<span class="ppe-badge">${ppe}</span>`
                                    ).join('')}
                                </div>
                            `;
                        }
                        
                        let missingPPE = '';
                        if (instance.missing_ppe.length > 0 && instance.missing_ppe[0] !== '') {
                            missingPPE = `
                                <div class="ppe-section">
                                    <div class="ppe-section-title">Missing PPE:</div>
                                    ${instance.missing_ppe.map(ppe => 
                                        `<span class="ppe-badge missing">${ppe}</span>`
                                    ).join('')}
                                </div>
                            `;
                        }

                        return `
                            <div class="instance-card">
                                <div class="instance-content">
                                    <div class="instance-header">
                                        <div class="instance-id">
                                            ${instance.instance_id}
                                        </div>
                                        <div class="compliance-badge non-compliant">
                                            <i class="fas fa-times-circle"></i> Non-Compliant
                                        </div>
                                    </div>
                                    <div class="instance-time">
                                        <i class="fas fa-clock"></i> ${timeString}
                                    </div>
                                    <div class="instance-time">
                                        <i class="fas fa-images"></i> ${instance.snapshot_count} snapshot(s)
                                    </div>
                                    <div class="ppe-info">
                                        ${detectedPPE}
                                        ${missingPPE}
                                    </div>
                                    <div class="instance-actions">
                                        <button onclick="reviewInstance('${instance.instance_id}')" 
                                                class="btn btn-primary btn-sm">
                                            <i class="fas fa-eye"></i> Review Instance
                                        </button>
                                        <button onclick="deleteInstance('${instance.instance_id}')" 
                                                class="btn btn-danger btn-sm">
                                            <i class="fas fa-trash"></i> Delete
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');

                    updateStats(data.length);
                })
                .catch(error => {
                    console.error('Error loading instances:', error);
                });
        }

        function reviewInstance(instanceId) {
            const modal = document.getElementById('snapshotModal');
            const modalBody = document.getElementById('modalBody');
            const modalTitle = document.getElementById('modalTitle');
            
            modal.classList.add('active');
            modalTitle.textContent = `Instance: ${instanceId}`;
            modalBody.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading snapshots...</p>
                </div>
            `;

            fetch(`/api/instance/${instanceId}/snapshots`)
                .then(response => response.json())
                .then(data => {
                    if (data && data.snapshots && data.snapshots.length > 0) {
                        let detectedPPE = '';
                        if (data.detected_ppe.length > 0 && data.detected_ppe[0] !== '') {
                            detectedPPE = `
                                <div class="ppe-section">
                                    <div class="ppe-section-title">Detected PPE:</div>
                                    ${data.detected_ppe.map(ppe => 
                                        `<span class="ppe-badge">${ppe}</span>`
                                    ).join('')}
                                </div>
                            `;
                        }
                        
                        let missingPPE = '';
                        if (data.missing_ppe.length > 0 && data.missing_ppe[0] !== '') {
                            missingPPE = `
                                <div class="ppe-section">
                                    <div class="ppe-section-title">Missing PPE:</div>
                                    ${data.missing_ppe.map(ppe => 
                                        `<span class="ppe-badge missing">${ppe}</span>`
                                    ).join('')}
                                </div>
                            `;
                        }

                        modalBody.innerHTML = `
                            <div class="ppe-info" style="margin-bottom: 20px;">
                                ${detectedPPE}
                                ${missingPPE}
                            </div>
                            <div class="snapshots-grid">
                                ${data.snapshots.map((snapshot, index) => {
                                    const time = new Date(snapshot.timestamp).toLocaleString();
                                    return `
                                        <div class="snapshot-item">
                                            <img src="/${snapshot.path}" 
                                                 alt="Snapshot ${index + 1}" 
                                                 class="snapshot-image"
                                                 onclick="window.open('/${snapshot.path}', '_blank')">
                                            <div class="snapshot-info">
                                                <div class="snapshot-number">Snapshot #${index + 1}</div>
                                                <div class="snapshot-time">
                                                    <i class="fas fa-clock"></i> ${time}
                                                </div>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        `;
                    } else {
                        modalBody.innerHTML = `
                            <div class="empty-state">
                                <i class="fas fa-exclamation-circle"></i>
                                <p>No snapshots available for this instance</p>
                            </div>
                        `;
                    }
                })
                .catch(error => {
                    console.error('Error loading snapshots:', error);
                    modalBody.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-exclamation-circle"></i>
                            <p>Error loading snapshots</p>
                        </div>
                    `;
                });
        }

        function closeModal() {
            document.getElementById('snapshotModal').classList.remove('active');
        }

        window.onclick = function(event) {
            const modal = document.getElementById('snapshotModal');
            if (event.target == modal) {
                closeModal();
            }
        }

        function updateStats(total) {
            document.getElementById('totalInstances').textContent = total;
        }

        function deleteInstance(instanceId) {
            if (!confirm('Are you sure you want to delete this instance and all its snapshots?')) {
                return;
            }

            fetch(`/api/delete_instance/${instanceId}`, { method: 'DELETE' })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        loadInstances();
                    } else {
                        alert('Failed to delete instance');
                    }
                })
                .catch(error => {
                    console.error('Error deleting instance:', error);
                    alert('Error deleting instance');
                });
        }

        loadInstances();
    </script>
</body>
</html>
